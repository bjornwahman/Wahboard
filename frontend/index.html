<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wahboard Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-badge" aria-hidden="true"><span class="brand-logo">W#</span></div>
          <h1>Wahboard</h1>
        </div>
        <nav class="nav">
          <a href="index.html">Överblick</a>
          <a href="checks.html">API Checks</a>
          <a href="system.html">System</a>
        </nav>
      </aside>

      <main class="main">
        <header class="page-header">
          <div>
            <h2>Överblicks-dashboard</h2>
            <p class="muted">Live status för API-checkar och systeminställningar.</p>
          </div>
          <div class="dashboard-controls">
            <label>
              Statusfilter
              <select id="status-filter">
                <option value="all">Alla</option>
                <option value="ok">Endast OK</option>
                <option value="failing">Endast felande</option>
                <option value="untested">Endast ej körda</option>
              </select>
            </label>
            <label>
              Tidsintervall
              <select id="time-filter">
                <option value="all">All historik</option>
                <option value="1h">Senaste timmen</option>
                <option value="24h">Senaste 24 timmarna</option>
                <option value="7d">Senaste 7 dagarna</option>
              </select>
            </label>
          </div>
        </header>

        <section class="grid cards-3" id="metrics"></section>

        <section class="card" style="margin-top: 16px;">
          <h3>Senaste check-resultat</h3>
          <table>
            <thead>
              <tr>
                <th>Namn</th>
                <th>Endpoint</th>
                <th>Status</th>
                <th>Senast kört</th>
              </tr>
            </thead>
            <tbody id="recent-results"></tbody>
          </table>
        </section>
      </main>
    </div>

    <script type="module" src="dashboard.js"></script>
  </body>
</html>
