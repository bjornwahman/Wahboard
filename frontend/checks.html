<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wahboard API Checks</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-badge" aria-hidden="true"><span class="brand-logo">W#</span></div>
          <h1>Wahboard</h1>
        </div>
        <nav class="nav">
          <a href="index.html">Överblick</a>
          <a href="checks.html">API Checks</a>
          <a href="system.html">System</a>
        </nav>
      </aside>

      <main class="main">
        <header class="page-header">
          <div>
            <h2>REST API checks</h2>
            <p class="muted">Skapa, kör och ta bort checks direkt i GUI.</p>
          </div>
          <div style="display:flex; gap:8px;"><button id="run-all">Kör alla checks</button><button id="run-due" class="secondary">Kör schemalagda</button></div>
        </header>

        <section class="card">
          <h3>Ny check</h3>
          <form id="check-form" class="form-grid">
            <label>Typ
              <select name="type" id="check-type">
                <option value="rest">REST API</option>
                <option value="kusto">Azure Kusto</option>
                <option value="powershell">PowerShell</option>
              </select>
            </label>
            <label>Namn
              <input name="name" required placeholder="Auth Health" />
            </label>
            <label>Dashboard
              <select name="dashboardId" id="dashboard-select"></select>
            </label>
            <label class="rest-field">Endpoint URL
              <input name="url" type="url" placeholder="https://api.example.com/health" />
            </label>
            <label class="rest-field">Method
              <select name="method">
                <option>GET</option>
                <option>POST</option>
                <option>PUT</option>
                <option>DELETE</option>
              </select>
            </label>
            <label class="rest-field">Expected status
              <input name="expectedStatus" type="number" min="100" max="599" value="200" />
            </label>
            <label class="kusto-field">Kusto databas
              <input name="kustoDatabase" placeholder="OperationsDB" />
            </label>
            <label class="kusto-field">Kusto query
              <textarea name="kustoQuery" rows="3" placeholder="Heartbeat | take 1"></textarea>
            </label>
            <label class="kusto-field">Expected rows (min)
              <input name="expectedRows" type="number" min="0" value="1" />
            </label>
            <label class="powershell-field">PowerShell script
              <textarea name="script" rows="5" placeholder="Get-Service | Where-Object {$_.Status -eq &quot;Running&quot;} | Select-Object -First 5"></textarea>
            </label>
            <label class="powershell-field">Förväntad text i output
              <input name="expectedText" placeholder="Running" />
            </label>
            <label class="powershell-field">Script-timeout (ms)
              <input name="scriptTimeoutMs" type="number" min="500" value="5000" />
            </label>
            <label>Interval (s)
              <input name="intervalSeconds" type="number" min="5" value="30" />
            </label>
            <div style="display:flex;align-items:end;">
              <button type="submit">Lägg till check</button>
            </div>
          </form>
        </section>

        <section class="card" style="margin-top: 16px;">
          <h3>Check-lista</h3>
          <table>
            <thead>
              <tr>
                <th>Typ</th>
                <th>Namn</th>
                <th>Target</th>
                <th>Status</th>
                <th>Latency</th>
                <th>Senaste output</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="checks-table"></tbody>
          </table>
        </section>
      </main>
    </div>

    <script type="module" src="checks.js"></script>
  </body>
</html>
