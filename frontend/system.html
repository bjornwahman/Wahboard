<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wahboard System</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-badge" aria-hidden="true"><span class="brand-logo">W#</span></div>
          <h1>Wahboard</h1>
        </div>
        <nav class="nav">
          <a href="index.html">Överblick</a>
          <a href="checks.html">API Checks</a>
          <a href="system.html">System</a>
        </nav>
      </aside>

      <main class="main">
        <header class="page-header">
          <div>
            <h2>Systeminställningar</h2>
            <p class="muted">Hantera globala settings för checks och dashboard.</p>
          </div>
        </header>

        <section class="card">
          <form id="settings-form" class="form-grid">
            <label>Default timeout (ms)
              <input name="defaultTimeoutMs" type="number" min="500" step="100" />
            </label>
            <label>Auto refresh (sek)
              <input name="autoRefreshSeconds" type="number" min="5" />
            </label>
            <label>Environment label
              <input name="environmentLabel" placeholder="production" />
            </label>
            <label>Notifieringsmail
              <input name="notificationEmail" type="email" placeholder="ops@company.se" />
            </label>
            <label>Azure Tenant ID
              <input name="azureTenantId" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
            </label>
            <label>Azure Client ID
              <input name="azureClientId" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
            </label>
            <label>Azure Client Secret
              <input name="azureClientSecret" type="password" placeholder="Klienthemlighet" />
            </label>
            <label>Azure Kusto Cluster URL
              <input name="azureKustoClusterUrl" placeholder="https://cluster.kusto.windows.net" />
            </label>
            <label>Azure Kusto default-databas
              <input name="azureKustoDatabase" placeholder="OperationsDB" />
            </label>
            <div style="display:flex; align-items:end; gap:10px;">
              <button type="submit">Spara inställningar</button>
              <button class="secondary" type="button" id="reset-settings">Återställ</button>
            </div>
          </form>
        </section>

        <section class="card" style="margin-top: 16px;">
          <h3>Systemstatus</h3>
          <p class="muted" id="settings-summary"></p>
        </section>
      </main>
    </div>

    <script type="module" src="system.js"></script>
  </body>
</html>
